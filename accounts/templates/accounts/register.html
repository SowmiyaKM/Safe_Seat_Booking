{% extends 'booking/base.html' %}

{% block content %}

<div class="payment-card">

    <h1>📝 Register</h1>

    <form method="post">

        {% csrf_token %}

        <div class="mb-3">
            <input type="text"
                   name="username"
                   class="form-control"
                   placeholder="Username"
                   required>
        </div>

        <div class="mb-3">
            <input type="password"
                   name="password"
                   class="form-control"
                   placeholder="Password"
                   required>
        </div>

        <button class="btn btn-success btn-lg">
            Register
        </button>

    </form>

    <br>

    <p>
        Already have an account?
    </p>

    <a href="{% url 'login' %}">
        <button class="btn btn-primary">
            Login
        </button>
    </a>

</div>

{% endblock %}
